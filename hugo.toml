baseURL = "https://smartmallshop.github.io/"
languageCode = "ko-kr"
title = "smartmallshop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "거실, 침실, 주방 등 다양한 공간을 위한 인테리어 소품과 가구를 제안하는 쇼핑 블로그입니다. 최신 트렌드와 감각적인 홈데코 아이템을 매일 큐레이션합니다."
keywords = ["인테리어소품", "가구", "홈데코", "조명", "공간스타일링", "트렌드쇼핑"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = ""
naverSiteVerification = ""
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "감각적인 인테리어와 가구 쇼핑, 스마트몰샵"
Content = "스마트몰샵에서는 거실, 침실, 주방 등 집안의 모든 공간을 스타일리시하게 꾸밀 수 있는 인테리어 소품과 가구를 소개합니다. 트렌디한 홈데코 아이템과 실용적인 가구로 나만의 공간을 완성해보세요. 매일 새로운 스타일링 팁과 추천 상품을 확인하세요."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
